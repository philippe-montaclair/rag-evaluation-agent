name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov
        # Note : la suite est 100% mockée. Les libs lourdes (ragas, trulens,
        # prometheus, openai) sont optionnelles et remplacées par des fallbacks
        # dans le module -> aucun besoin de les installer pour les tests.

      - name: Run tests
        run: pytest test_rag_evaluation_agent.py -v --cov=rag_evaluation_agent --cov-report=term-missing
